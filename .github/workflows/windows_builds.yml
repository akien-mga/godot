name: 🏁 Windows Builds
on: [push, pull_request]

# Global Settings
# SCONS_CACHE for windows must be set in the build environment
env:
  GODOT_BASE_BRANCH: master
  SCONSFLAGS: platform=windows verbose=yes warnings=extra werror=no debug_symbols=no --jobs=2 module_text_server_fb_enabled=yes

jobs:
  windows-editor:
    # Windows 10 with latest image
    runs-on: "windows-latest"

    # Windows Editor - checkout with the plugin
    name: Editor (target=release_debug, tools=yes, tests=yes)

    steps:
    - uses: actions/checkout@v2

    # Use python 3.x release (works cross platform; best to keep self contained in it's own step)
    - name: Set up Python 3.x
      uses: actions/setup-python@v2
      with:
        # Semantic version range syntax or exact version of a Python version
        python-version: '3.x'
        # Optional - x64 or x86 architecture, defaults to x64
        architecture: 'x64'

    # Setup scons, print python version and scons version info, so if anything is broken it won't run the build.
    - name: Configuring Python packages
      run: |
        python -c "import sys; print(sys.version)"
        python -m pip install scons pywin32
        python --version
        scons --version

    # We should always be explicit with our flags usage here since it's gonna be sure to always set those flags
    - name: Compilation
      run: |
        scons tools=yes tests=yes target=release_debug
        ls -l bin/

    # Execute unit tests for the editor
    - name: Unit Tests
      run: |
        ./bin/godot.windows.opt.tools.64.exe --test

    - uses: actions/upload-artifact@v2
      with:
        name: ${{ github.job }}
        path: bin/*
        retention-days: 14

  windows-template:
    runs-on: "windows-latest"
    name: Template (target=release, tools=no)

    steps:
    - uses: actions/checkout@v2

    # Use python 3.x release (works cross platform)
    - name: Set up Python 3.x
      uses: actions/setup-python@v2
      with:
        # Semantic version range syntax or exact version of a Python version
        python-version: '3.x'
        # Optional - x64 or x86 architecture, defaults to x64
        architecture: 'x64'

    # You can test your matrix by printing the current Python version
    - name: Configuring Python packages
      run: |
        python -c "import sys; print(sys.version)"
        python -m pip install scons pywin32
        python --version
        scons --version

    - name: Compilation
      run: |
        scons target=release tools=no
        ls -l bin/

    - uses: actions/upload-artifact@v2
      with:
        name: ${{ github.job }}
        path: bin/*
        retention-days: 14
